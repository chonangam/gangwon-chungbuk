<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>대기측정망 · 강원/충북</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="강원충북대기">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e1a; --bg-card: #131826; --bg-elev: #1a2034;
    --border: #2a3148; --border-soft: #1f2538;
    --text: #f5f5f0; --text-dim: #8a92a8; --text-mute: #5a6280;
    --good: #1e88e5; --normal: #43a047; --bad: #fb8c00; --vbad: #e53935;
    --missing: #6b7280; --offline: #9333ea;
    --gw: #e8925a; --cb: #a371f7;
  }
  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    background: radial-gradient(ellipse 80% 30% at 50% 0%, rgba(232,146,90,0.05), transparent 60%),
                radial-gradient(ellipse 60% 30% at 100% 100%, rgba(163,113,247,0.04), transparent 60%), var(--bg);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    max-width: 1200px; margin: 0 auto;
  }
  header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border-soft); }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--gw), var(--cb)); border-radius: 10px; display: grid; place-items: center; font-size: 20px; box-shadow: 0 0 24px rgba(232,146,90,0.2); }
  h1 { font-size: 17px; font-weight: 700; line-height: 1.2; letter-spacing: -0.3px; }
  .brand-sub { font-size: 11px; color: var(--text-mute); letter-spacing: 0.8px; font-weight: 500; margin-top: 2px; }
  .icon-btn { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim); width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; cursor: pointer; transition: all .15s; }
  .icon-btn:hover { color: var(--text); border-color: var(--text-mute); }
  .icon-btn svg { width: 17px; height: 17px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 10px; padding: 10px 12px; }
  .stat-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 3px; }
  .stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-val .total { color: var(--text-mute); font-size: 13px; font-weight: 500; }
  .stat.s-normal .stat-val { color: var(--normal); }
  .stat.s-warn .stat-val { color: var(--bad); }
  .stat.s-crit .stat-val { color: var(--vbad); }
  .live-bar { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-mute); }
  .live-left { display: flex; align-items: center; gap: 8px; }
  .live-dot { width: 6px; height: 6px; background: var(--normal); border-radius: 50%; animation: pulse 2s infinite; }
  .live-dot.stale { background: var(--bad); animation: none; }
  .live-dot.error { background: var(--vbad); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }
  .refresh-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px 6px; font-family: inherit; font-size: 11px; display: flex; align-items: center; gap: 5px; border-radius: 6px; }
  .refresh-btn:hover { background: var(--bg-elev); color: var(--text); }
  .refresh-btn svg { width: 12px; height: 12px; }
  .refresh-btn.spinning svg { animation: spin .8s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tabs { display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid var(--border-soft); overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { background: none; border: none; color: var(--text-mute); font-family: inherit; font-size: 13px; font-weight: 600; padding: 14px 14px 12px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: color .15s; }
  .tab:hover { color: var(--text-dim); }
  .tab.active { color: var(--text); border-bottom-color: var(--gw); }
  .tab .badge { background: var(--bg-elev); color: var(--text-dim); padding: 1px 7px; border-radius: 10px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }
  .tab.active .badge { background: var(--gw); color: white; }
  .tab.alert .badge { background: var(--vbad); color: white; }
  main { padding: 16px 16px 80px; }
  .region-header { display: flex; align-items: center; gap: 8px; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border-soft); }
  .region-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-gw { background: var(--gw); box-shadow: 0 0 8px rgba(232,146,90,.5); }
  .dot-cb { background: var(--cb); box-shadow: 0 0 8px rgba(163,113,247,.5); }
  .region-name { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
  .region-count { font-size: 11px; color: var(--text-mute); margin-left: auto; font-family: 'IBM Plex Mono', monospace; }
  .city-group { margin-bottom: 20px; }
  .city-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--border-soft); }
  .city-name { font-size: 16px; font-weight: 700; }
  .city-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-mute); }
  .stn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .stn { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all .15s; position: relative; overflow: hidden; }
  .stn:hover { border-color: var(--text-mute); }
  .stn::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--missing); }
  .stn.good::before{background:var(--good)} .stn.normal::before{background:var(--normal)} .stn.bad::before{background:var(--bad)} .stn.vbad::before{background:var(--vbad)} .stn.off::before{background:var(--offline)}
  .stn-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.2; }
  .stn-grade { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-bottom: 6px; letter-spacing: .5px; color: white; }
  .stn-grade.good{background:var(--good)} .stn-grade.normal{background:var(--normal)} .stn-grade.bad{background:var(--bad)} .stn-grade.vbad{background:var(--vbad)} .stn-grade.miss{background:var(--missing)} .stn-grade.off{background:var(--offline)}
  .stn-vals { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px; }
  .stn-vals .v{color:var(--text)} .stn-vals .v.warn{color:var(--bad)} .stn-vals .v.crit{color:var(--vbad)} .stn-vals .v.miss{color:var(--missing)}
  .priority-list { display: flex; flex-direction: column; gap: 10px; }
  .pcard { background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--bad); border-radius:10px; padding:14px 16px; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; cursor:pointer; transition:border-color .15s; }
  .pcard:hover{border-color:var(--text-mute)} .pcard.crit{border-left-color:var(--vbad)} .pcard.miss{border-left-color:var(--missing)} .pcard.off{border-left-color:var(--offline)}
  .pcard-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
  .pcard-tag { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:1px; color:white; }
  .pcard-tag.bad{background:var(--bad)} .pcard-tag.vbad{background:var(--vbad)} .pcard-tag.miss{background:var(--missing)} .pcard-tag.off{background:var(--offline)}
  .pcard-where { font-size:14px; font-weight:700; }
  .pcard-where .city{color:var(--text-mute);font-weight:500}
  .pcard-detail { font-size:12px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; display:flex; flex-wrap:wrap; gap:6px 12px; }
  .pcard-detail .crit{color:var(--vbad);font-weight:700} .pcard-detail .warn{color:var(--bad);font-weight:700}
  .pcard-time { text-align:right; font-size:11px; color:var(--text-mute); font-family:'IBM Plex Mono',monospace; min-width:60px; }
  .pcard-time .ago{color:var(--bad);font-weight:700;font-size:13px;display:block}
  .mismatch { background:rgba(229,57,53,.1); border:1px solid rgba(229,57,53,.3); border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:12px; color:var(--text-dim); }
  .mismatch strong{color:var(--vbad)}
  .mm-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .mm-item{background:rgba(0,0,0,.25);border-radius:6px;padding:8px 10px}
  .mm-target{font-size:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .mm-candidates{display:flex;flex-wrap:wrap;gap:5px}
  .mm-btn{background:var(--bg-elev);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:14px;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s}
  .mm-btn:hover{background:var(--gw);border-color:var(--gw);color:white}
  .mm-del-btn{background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.35);color:var(--vbad);padding:3px 9px;border-radius:4px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
  .mm-del-btn:hover{background:var(--vbad);color:white;border-color:var(--vbad)}
  .mm-empty{font-size:11px;color:var(--text-mute);font-style:italic}
  .empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
  .empty .emoji{font-size:36px;margin-bottom:12px} .empty .title{font-size:15px;color:var(--text);font-weight:700;margin-bottom:6px} .empty .desc{font-size:13px;line-height:1.5}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center}
  .modal-bg.open{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--bg-card);border:1px solid var(--border);border-bottom:none;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:8px 20px 32px;animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 16px}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:6px} .modal-sub{font-size:12px;color:var(--text-dim);margin-bottom:18px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
  .detail-cell{background:var(--bg-elev);border:1px solid var(--border-soft);border-radius:8px;padding:10px 12px;text-align:center}
  .detail-cell .k{font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px}
  .detail-cell .v{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700}
  .detail-cell .u{font-size:10px;color:var(--text-mute);margin-left:2px;font-weight:500}
  .field{margin-bottom:14px} .field-label{display:block;font-size:10px;color:var(--text-mute);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;margin-bottom:6px}
  .field-help{font-size:11px;color:var(--text-mute);margin-top:5px;line-height:1.4}
  input[type="text"],input[type="password"],input[type="number"]{width:100%;background:var(--bg-elev);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;transition:border .15s}
  input:focus{border-color:var(--gw)}
  .threshold-grid{display:grid;grid-template-columns:80px 1fr 60px;gap:8px;align-items:center;margin-bottom:8px}
  .threshold-grid .label{font-size:12px;font-weight:600} .threshold-grid .unit{font-size:11px;color:var(--text-mute)}
  .btn{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-elev);color:var(--text);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn:hover{border-color:var(--text-mute)} .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--gw);color:white;border-color:var(--gw)} .btn-full{width:100%}
  .modal-actions{display:flex;gap:8px;margin-top:18px} .modal-actions .btn{flex:1}
  .hint{background:var(--bg-elev);border-left:3px solid var(--gw);padding:10px 12px;border-radius:6px;font-size:12px;color:var(--text-dim);line-height:1.5;margin-bottom:14px}
  .hint a{color:var(--gw);text-decoration:none}
</style>
</head>
<body>
<header>
  <div class="header-row">
    <div class="brand">
      <div class="brand-icon">🌫️</div>
      <div>
        <h1>대기측정망 · <span style="color:var(--gw)">강원</span>/<span style="color:var(--cb)">충북</span></h1>
        <div class="brand-sub" id="brandSub">강원/충북 · 6개 측정소</div>
      </div>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="설정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">전체</div><div class="stat-val" id="statTotal">— <span class="total">/6</span></div></div>
    <div class="stat s-normal"><div class="stat-label">정상</div><div class="stat-val" id="statOk">—</div></div>
    <div class="stat s-warn"><div class="stat-label">이상</div><div class="stat-val" id="statWarn">—</div></div>
    <div class="stat s-crit"><div class="stat-label">결측</div><div class="stat-val" id="statMiss">—</div></div>
  </div>
  <div class="live-bar">
    <div class="live-left">
      <span class="live-dot" id="liveDot"></span>
      <span id="liveStatus">대기 중</span>
    </div>
    <button class="refresh-btn" id="refreshBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      <span>새로고침</span>
    </button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="priority">🚨 점검 우선순위 <span class="badge" id="badgePriority">—</span></button>
  <button class="tab" data-tab="overview">📊 전체 현황</button>
</nav>

<main id="content">
  <div class="empty"><div class="emoji">🔑</div><div class="title">API 키 설정이 필요합니다</div><div class="desc">우측 상단 ⚙️ 버튼을 눌러 서비스키를 입력하세요</div></div>
</main>

<!-- 설정 모달 -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 class="modal-title">설정</h2>
    <p class="modal-sub">에어코리아 API 및 임계값 설정</p>
    <div class="hint">📍 <a href="https://www.data.go.kr" target="_blank">공공데이터포털</a>에서<br>"한국환경공단 에어코리아 대기오염정보" 활용신청 → Decoding 키 발급</div>
    <div class="field">
      <label class="field-label">서비스 키 (Decoding)</label>
      <input type="password" id="apiKeyInput" placeholder="공공데이터포털 인증키">
    </div>
    <div class="field">
      <label class="field-label">CORS 프록시 (브라우저 사용 시)</label>
      <input type="text" id="proxyInput" placeholder="비워두면 직접 호출 / 예: https://corsproxy.io/?">
      <div class="field-help">※ Android WebView로 빌드하면 비워두세요</div>
    </div>
    <div class="field">
      <label class="field-label">이상값 임계 (1시간 평균)</label>
      <div class="threshold-grid"><span class="label">PM10</span><input type="number" id="th_pm10" step="1"><span class="unit">㎍/㎥</span></div>
      <div class="threshold-grid"><span class="label">PM2.5</span><input type="number" id="th_pm25" step="1"><span class="unit">㎍/㎥</span></div>
      <div class="threshold-grid"><span class="label">NO₂</span><input type="number" id="th_no2" step="0.001"><span class="unit">ppm</span></div>
      <div class="threshold-grid"><span class="label">O₃</span><input type="number" id="th_o3" step="0.001"><span class="unit">ppm</span></div>
      <div class="threshold-grid"><span class="label">CO</span><input type="number" id="th_co" step="0.1"><span class="unit">ppm</span></div>
      <div class="threshold-grid"><span class="label">SO₂</span><input type="number" id="th_so2" step="0.001"><span class="unit">ppm</span></div>
    </div>
    <div class="field">
      <label class="field-label">자동 갱신 주기</label>
      <input type="number" id="refreshMin" step="1" min="5" placeholder="분 단위 (최소 5)">
    </div>
    <div class="field">
      <label class="field-label">측정소 매핑 초기화</label>
      <button class="btn btn-full" id="resetStations" style="background:rgba(229,57,53,.15);border-color:rgba(229,57,53,.4);color:var(--vbad);">🔄 HTML 코드에서 측정소 목록 다시 읽기</button>
    </div>
    <div class="modal-actions">
      <button class="btn" id="cancelSettings">취소</button>
      <button class="btn btn-primary" id="saveSettings">저장</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="detailTitle">측정소</h2>
    <p class="modal-sub" id="detailSub">— · —</p>
    <div class="detail-grid" id="detailGrid"></div>
    <div class="field">
      <label class="field-label">측정 시각</label>
      <div id="detailTime" style="font-family:'IBM Plex Mono',monospace;font-size:13px;">—</div>
    </div>
    <div class="field" id="detailFlags"></div>
    <div class="modal-actions">
      <button class="btn btn-full" id="closeDetail">닫기</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'airdash_gwcb_v1';

const MY_STATIONS = {
  '강원': {
    '속초시': ['금호동'],
    '철원군': ['갈말읍'],
    '홍천군': ['홍천읍'],
  },
  '충북': {
    '괴산군': ['괴산읍','감물면'],
    '보은군': ['보은읍'],
  }
};

function totalCount() {
  return Object.values(MY_STATIONS).reduce((a,b)=>a+Object.values(b).reduce((c,d)=>c+d.length,0),0);
}

const DEFAULT = {
  apiKey:'', proxy:'', refreshMin:10,
  thresholds:{pm10:80,pm25:35,no2:0.10,o3:0.12,co:25,so2:0.15}
};

let cfg = loadCfg();
if (cfg.stations) { for (const r of Object.keys(MY_STATIONS)) delete MY_STATIONS[r]; Object.assign(MY_STATIONS, cfg.stations); }
let lastData=[], mismatched=[], lastFetchTime=null, currentTab='priority', refreshTimer=null;

function loadCfg() {
  try { const s=localStorage.getItem(STORAGE_KEY); if(s){const p=JSON.parse(s);return{...DEFAULT,...p,thresholds:{...DEFAULT.thresholds,...(p.thresholds||{})}};} } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function saveCfg() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); }

async function fetchSido(sidoName) {
  const base='https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCtprvnRltmMesureDnsty';
  const qs=new URLSearchParams({serviceKey:cfg.apiKey,returnType:'json',numOfRows:'500',pageNo:'1',sidoName,ver:'1.0'}).toString();
  let url=base+'?'+qs;
  if (cfg.proxy) url=cfg.proxy+encodeURIComponent(url);
  const res=await fetch(url); const text=await res.text();
  if (!res.ok) { const m1=text.match(/<returnAuthMsg>([^<]+)<\/returnAuthMsg>/); throw new Error(`HTTP ${res.status} ${m1?.[1]||''}`); }
  let data; try{data=JSON.parse(text);}catch(e){throw new Error('파싱 실패');}
  const hdr=data?.response?.header;
  if (hdr?.resultCode&&hdr.resultCode!=='00') throw new Error(`API 오류(${hdr.resultCode}): ${hdr.resultMsg}`);
  const items=data?.response?.body?.items||[];
  return Array.isArray(items)?items:[items];
}

async function fetchAll() {
  if (!cfg.apiKey) throw new Error('서비스 키가 설정되지 않았습니다');
  const [gwItems,cbItems]=await Promise.all([fetchSido('강원'),fetchSido('충북')]);
  return [...gwItems,...cbItems];
}

function num(v){if(v==null||v===''||v==='-')return null;const n=Number(v);return isFinite(n)?n:null;}
function gradeOf(g){const n=Number(g);if(n===1)return'good';if(n===2)return'normal';if(n===3)return'bad';if(n===4)return'vbad';return'miss';}
function gradeLabel(g){return{good:'좋음',normal:'보통',bad:'나쁨',vbad:'매우나쁨',miss:'결측',off:'두절'}[g]||'—';}

function analyzeStation(item) {
  const flags={pm10:item.pm10Flag,pm25:item.pm25Flag,no2:item.no2Flag,o3:item.o3Flag,co:item.coFlag,so2:item.so2Flag};
  const vals={pm10:num(item.pm10Value),pm25:num(item.pm25Value),no2:num(item.no2Value),o3:num(item.o3Value),co:num(item.coValue),so2:num(item.so2Value)};
  const t=cfg.thresholds;
  const over={pm10:vals.pm10!=null&&vals.pm10>t.pm10,pm25:vals.pm25!=null&&vals.pm25>t.pm25,no2:vals.no2!=null&&vals.no2>t.no2,o3:vals.o3!=null&&vals.o3>t.o3,co:vals.co!=null&&vals.co>t.co,so2:vals.so2!=null&&vals.so2>t.so2};
  const allNull=vals.pm10==null&&vals.pm25==null&&vals.no2==null&&vals.o3==null;
  let staleMin=null;
  if(item.dataTime){const dt=new Date(item.dataTime.replace(' ','T')+'+09:00');if(!isNaN(dt.getTime()))staleMin=Math.floor((Date.now()-dt.getTime())/60000);}
  const offline=staleMin!=null&&staleMin>120;
  const missingItems=Object.entries(flags).filter(([k,f])=>f!=null&&f!=='').map(([k,f])=>({key:k,flag:f}));
  let priority='ok';
  if(offline)priority='offline';else if(allNull)priority='missing';else if(Object.values(over).some(Boolean))priority='over';else if(missingItems.length>0)priority='partial';
  return{vals,flags,over,allNull,offline,staleMin,missingItems,priority,khai:gradeOf(item.khaiGrade)};
}

function processData(items) {
  const byName={};for(const it of items)byName[it.stationName]=it;
  const allNames=Object.keys(byName);
  const myAllStations=new Set();
  for(const regions of Object.values(MY_STATIONS))for(const stns of Object.values(regions))for(const s of stns)myAllStations.add(s);
  const result=[];mismatched=[];
  for(const[region,cities]of Object.entries(MY_STATIONS)){
    for(const[city,stns]of Object.entries(cities)){
      for(const stn of stns){
        const item=byName[stn];
        if(item){result.push({region,city,station:stn,...analyzeStation(item),raw:item});}
        else{mismatched.push({region,city,station:stn,candidates:findCandidates(stn,allNames,myAllStations)});}
      }
    }
  }
  return result;
}

function findCandidates(target,allNames,claimed){
  const t=target.replace(/[()]/g,'').replace(/\s+/g,'');
  const scored=[];
  for(const name of allNames){
    if(claimed.has(name))continue;
    const n=name.replace(/[()]/g,'').replace(/\s+/g,'');
    let score=0;
    if(n===t)score=100;else if(n.includes(t)||t.includes(n))score=80;
    else if(t.length>=2&&n.startsWith(t.substring(0,2)))score=60;
    else if(t.length>=2&&n.includes(t.substring(0,2)))score=40;
    if(score>0)scored.push({name,score});
  }
  return scored.sort((a,b)=>b.score-a.score).slice(0,5).map(x=>x.name);
}

function updateStats(){
  let ok=0,warn=0,miss=0;
  for(const s of lastData){if(s.priority==='ok')ok++;else if(s.priority==='over'||s.priority==='partial')warn++;else if(s.priority==='missing'||s.priority==='offline')miss++;}
  const total=totalCount();
  document.getElementById('statTotal').innerHTML=`${lastData.length} <span class="total">/${total}</span>`;
  document.getElementById('statOk').textContent=ok;
  document.getElementById('statWarn').textContent=warn;
  document.getElementById('statMiss').textContent=miss;
  document.getElementById('brandSub').textContent=`강원/충북 · ${total}개 측정소`;
  const alerts=warn+miss+mismatched.length;
  const badge=document.getElementById('badgePriority');
  badge.textContent=alerts;
  document.querySelector('[data-tab="priority"]').classList.toggle('alert',alerts>0);
}

function setLive(text,state){
  const dot=document.getElementById('liveDot');
  dot.classList.remove('stale','error');
  if(state==='error')dot.classList.add('error');else if(state==='stale')dot.classList.add('stale');
  document.getElementById('liveStatus').textContent=text;
}

function renderTab(){
  const root=document.getElementById('content');
  if(!cfg.apiKey){root.innerHTML=`<div class="empty"><div class="emoji">🔑</div><div class="title">API 키 설정이 필요합니다</div><div class="desc">우측 상단 ⚙️ 버튼을 눌러 서비스키를 입력하세요</div></div>`;return;}
  if(lastData.length===0&&mismatched.length===0){root.innerHTML=`<div class="empty"><div class="emoji">⏳</div><div class="title">데이터 불러오는 중…</div></div>`;return;}
  if(currentTab==='priority')renderPriority(root);else renderOverview(root);
}

function renderPriority(root){
  const order={offline:0,missing:1,over:2,partial:3,ok:4};
  const priority=lastData.filter(s=>s.priority!=='ok').sort((a,b)=>order[a.priority]-order[b.priority]);
  let html='';
  if(mismatched.length>0){
    html+=`<div class="mismatch"><strong>⚠️ 응답에서 찾지 못한 측정소 (${mismatched.length})</strong><br>아래 후보 중 맞는 것을 탭하면 자동으로 교체됩니다.
      <div class="mm-list">${mismatched.map(m=>`
        <div class="mm-item">
          <div class="mm-target"><span style="color:var(--text-mute);font-size:11px">${m.region} · ${m.city}</span> · <strong>${m.station}</strong>
            <button class="mm-del-btn" data-region="${m.region}" data-city="${m.city}" data-station="${m.station}">🗑️ 삭제</button></div>
          ${m.candidates.length>0?`<div class="mm-candidates">${m.candidates.map(c=>`<button class="mm-btn" data-region="${m.region}" data-city="${m.city}" data-old="${m.station}" data-new="${c}">${c}</button>`).join('')}</div>`:`<div class="mm-empty">유사 측정소 없음</div>`}
        </div>`).join('')}</div></div>`;
  }
  if(priority.length===0&&mismatched.length===0){
    html+=`<div class="empty"><div class="emoji">✅</div><div class="title">모든 측정소 정상</div><div class="desc">이상값·결측·통신두절 측정소가 없습니다</div></div>`;
    root.innerHTML=html;return;
  }
  html+='<div class="priority-list">';
  for(const s of priority)html+=renderPCard(s);
  html+='</div>';
  root.innerHTML=html;
  root.querySelectorAll('.pcard').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.station)));
  root.querySelectorAll('.mm-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const arr=MY_STATIONS[btn.dataset.region]?.[btn.dataset.city];if(!arr)return;
    const idx=arr.indexOf(btn.dataset.old);if(idx===-1)return;
    arr[idx]=btn.dataset.new;cfg.stations=JSON.parse(JSON.stringify(MY_STATIONS));saveCfg();refresh(true);
  }));
  root.querySelectorAll('.mm-del-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const{region,city,station}=btn.dataset;if(!confirm(`${city} · ${station} 삭제?`))return;
    const arr=MY_STATIONS[region]?.[city];if(!arr)return;
    const idx=arr.indexOf(station);if(idx===-1)return;arr.splice(idx,1);
    if(arr.length===0)delete MY_STATIONS[region][city];
    cfg.stations=JSON.parse(JSON.stringify(MY_STATIONS));saveCfg();refresh(true);
  }));
}

function renderPCard(s){
  let tagCls,tagText,cardCls;
  if(s.priority==='offline'){tagCls='off';tagText='통신두절';cardCls='off';}
  else if(s.priority==='missing'){tagCls='miss';tagText='전체결측';cardCls='miss';}
  else if(s.priority==='over'){
    const exceeded=Object.entries(s.over).filter(([k,v])=>v).map(([k])=>k.toUpperCase());
    tagCls=exceeded.length>=2?'vbad':'bad';cardCls=exceeded.length>=2?'crit':'';
    tagText=exceeded.length>=2?`${exceeded.length}항목 초과`:`${exceeded[0]} 초과`;
  }else{tagCls='miss';tagText='부분결측';cardCls='miss';}
  const details=[];
  if(s.vals.pm10!=null)details.push(`<span class="${s.over.pm10?'crit':''}"><span style="color:var(--text-mute)">PM10</span> ${s.vals.pm10}</span>`);
  if(s.vals.pm25!=null)details.push(`<span class="${s.over.pm25?'crit':''}"><span style="color:var(--text-mute)">PM2.5</span> ${s.vals.pm25}</span>`);
  if(s.vals.no2!=null)details.push(`<span class="${s.over.no2?'warn':''}"><span style="color:var(--text-mute)">NO₂</span> ${s.vals.no2.toFixed(3)}</span>`);
  if(s.vals.o3!=null)details.push(`<span class="${s.over.o3?'warn':''}"><span style="color:var(--text-mute)">O₃</span> ${s.vals.o3.toFixed(3)}</span>`);
  if(s.missingItems.length>0)details.push(`<span style="color:var(--missing)">${s.missingItems.map(m=>m.key.toUpperCase()).join(',')} 결측</span>`);
  const ago=s.staleMin!=null?(s.staleMin<60?`${s.staleMin}분 전`:`${Math.floor(s.staleMin/60)}시간 전`):'';
  return`<div class="pcard ${cardCls}" data-station="${s.station}">
    <div>
      <div class="pcard-head">
        <span class="pcard-tag ${tagCls}">${tagText}</span>
        <span class="pcard-where"><span class="city">${s.region} · ${s.city}</span> ${s.station}</span>
      </div>
      <div class="pcard-detail">${details.join('')}</div>
    </div>
    <div class="pcard-time">${ago&&s.priority==='offline'?`<span class="ago">${ago}</span>`:''} ${(s.raw.dataTime||'').slice(11,16)}</div>
  </div>`;
}

function renderOverview(root){
  let html='';
  for(const[region,cities]of Object.entries(MY_STATIONS)){
    const dotCls=region==='강원'?'dot-gw':'dot-cb';
    const regionStns=Object.values(cities).flat();
    html+=`<div class="region-header"><div class="region-dot ${dotCls}"></div><span class="region-name">${region}</span><span class="region-count">${regionStns.length}개소</span></div>`;
    for(const[city,stns]of Object.entries(cities)){
      const cityData=lastData.filter(s=>s.city===city);
      if(cityData.length===0)continue;
      html+=`<div class="city-group"><div class="city-head"><span class="city-name">${city}</span><span class="city-count">${cityData.length}개소</span></div><div class="stn-grid">`;
      for(const s of cityData){
        const g=s.offline?'off':(s.allNull?'miss':s.khai);
        const pmCls=s.over.pm10?'crit':(s.flags.pm10?'miss':'');
        const p25Cls=s.over.pm25?'crit':(s.flags.pm25?'miss':'');
        const no2Cls=s.over.no2?'warn':(s.flags.no2?'miss':'');
        const o3Cls=s.over.o3?'warn':(s.flags.o3?'miss':'');
        const coCls=s.over.co?'warn':(s.flags.co?'miss':'');
        const so2Cls=s.over.so2?'warn':(s.flags.so2?'miss':'');
        html+=`<div class="stn ${g}" data-station="${s.station}">
          <div class="stn-name">${s.station}</div>
          <span class="stn-grade ${g}">${gradeLabel(g)}</span>
          <div class="stn-vals">
            <div><span style="color:var(--text-mute)">P10</span> <span class="v ${pmCls}">${s.vals.pm10??'—'}</span></div>
            <div><span style="color:var(--text-mute)">P25</span> <span class="v ${p25Cls}">${s.vals.pm25??'—'}</span></div>
            <div><span style="color:var(--text-mute)">NO₂</span> <span class="v ${no2Cls}">${s.vals.no2?.toFixed(3)??'—'}</span></div>
            <div><span style="color:var(--text-mute)">O₃</span> <span class="v ${o3Cls}">${s.vals.o3?.toFixed(3)??'—'}</span></div>
            <div><span style="color:var(--text-mute)">CO</span> <span class="v ${coCls}">${s.vals.co?.toFixed(1)??'—'}</span></div>
            <div><span style="color:var(--text-mute)">SO₂</span> <span class="v ${so2Cls}">${s.vals.so2?.toFixed(3)??'—'}</span></div>
          </div>
        </div>`;
      }
      html+=`</div></div>`;
    }
  }
  root.innerHTML=html;
  root.querySelectorAll('.stn').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.station)));
}

function openDetail(stationName){
  const s=lastData.find(x=>x.station===stationName);if(!s)return;
  document.getElementById('detailTitle').textContent=s.station;
  document.getElementById('detailSub').textContent=`${s.region} · ${s.city} · ${gradeLabel(s.khai)}`;
  const cells=[
    {k:'PM10',v:s.vals.pm10,u:'㎍/㎥',over:s.over.pm10},
    {k:'PM2.5',v:s.vals.pm25,u:'㎍/㎥',over:s.over.pm25},
    {k:'NO₂',v:s.vals.no2?.toFixed(3),u:'ppm',over:s.over.no2},
    {k:'O₃',v:s.vals.o3?.toFixed(3),u:'ppm',over:s.over.o3},
    {k:'CO',v:s.vals.co?.toFixed(1),u:'ppm',over:s.over.co},
    {k:'SO₂',v:s.vals.so2?.toFixed(3),u:'ppm',over:s.over.so2},
  ];
  document.getElementById('detailGrid').innerHTML=cells.map(c=>`
    <div class="detail-cell"><div class="k">${c.k}</div>
      <div class="v" style="${c.over?'color:var(--vbad)':''}">${c.v??'—'}<span class="u">${c.u}</span></div>
    </div>`).join('');
  document.getElementById('detailTime').textContent=s.raw.dataTime||'—';
  const flagsHtml=s.missingItems.length>0?`<label class="field-label">상태 플래그</label>`+s.missingItems.map(m=>`
    <div style="background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3);border-radius:6px;padding:6px 10px;margin-bottom:4px;font-size:12px;">
      <strong>${m.key.toUpperCase()}</strong>: ${m.flag}</div>`).join(''):'';
  document.getElementById('detailFlags').innerHTML=flagsHtml;
  document.getElementById('detailModal').classList.add('open');
}
document.getElementById('closeDetail').addEventListener('click',()=>document.getElementById('detailModal').classList.remove('open'));
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

async function refresh(manual=false){
  if(manual){const btn=document.getElementById('refreshBtn');btn.classList.add('spinning');setTimeout(()=>btn.classList.remove('spinning'),800);}
  if(!cfg.apiKey){renderTab();return;}
  setLive('갱신 중…','loading');
  try{
    const items=await fetchAll();lastData=processData(items);lastFetchTime=new Date();
    updateStats();renderTab();setLive(`실시간 · ${lastFetchTime.toTimeString().slice(0,5)} 갱신`,'ok');
  }catch(e){
    console.error(e);setLive(`오류 · ${e.message}`,'error');
    if(lastData.length===0)document.getElementById('content').innerHTML=`<div class="empty"><div class="emoji">⚠️</div><div class="title">불러오기 실패</div><div class="desc">${e.message}</div></div>`;
  }
}
function startAutoRefresh(){if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>refresh(false),cfg.refreshMin*60*1000);}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');currentTab=t.dataset.tab;renderTab();
}));

function openSettings(){
  document.getElementById('apiKeyInput').value=cfg.apiKey;
  document.getElementById('proxyInput').value=cfg.proxy;
  document.getElementById('refreshMin').value=cfg.refreshMin;
  for(const k of['pm10','pm25','no2','o3','co','so2'])document.getElementById('th_'+k).value=cfg.thresholds[k];
  document.getElementById('settingsModal').classList.add('open');
}
document.getElementById('settingsBtn').addEventListener('click',openSettings);
document.getElementById('cancelSettings').addEventListener('click',()=>document.getElementById('settingsModal').classList.remove('open'));
document.getElementById('saveSettings').addEventListener('click',()=>{
  cfg.apiKey=document.getElementById('apiKeyInput').value.trim();
  cfg.proxy=document.getElementById('proxyInput').value.trim();
  cfg.refreshMin=Math.max(5,Number(document.getElementById('refreshMin').value)||10);
  for(const k of['pm10','pm25','no2','o3','co','so2']){const v=Number(document.getElementById('th_'+k).value);if(isFinite(v)&&v>0)cfg.thresholds[k]=v;}
  saveCfg();document.getElementById('settingsModal').classList.remove('open');startAutoRefresh();refresh(true);
});
document.getElementById('refreshBtn').addEventListener('click',()=>refresh(true));
document.getElementById('resetStations').addEventListener('click',()=>{
  if(!confirm('측정소 매핑을 초기화하시겠습니까?'))return;
  delete cfg.stations;saveCfg();location.reload();
});

renderTab();refresh(true);startAutoRefresh();
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
